name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: TypeScript + Tests ─────────────────────────────────────────────
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript
        run: npm run typecheck --workspace=backend

      - name: Tests
        run: npm run test --workspace=backend

  # ── Frontend: TypeScript + Tests ────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript
        run: npm run lint --workspace=frontend

      - name: Tests
        run: npm run test --workspace=frontend

  # ── Coverage (main branch only) ─────────────────────────────────────────────
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Backend coverage
        run: npm run test:coverage --workspace=backend

      - name: Frontend coverage
        run: npm run test:coverage --workspace=frontend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 30

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30
